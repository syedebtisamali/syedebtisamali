<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDEEF1"/>
    </linearGradient>
    <radialGradient id="glowLight" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8A6D2F" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#8A6D2F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgLight)"/>
  <rect width="1200" height="300" fill="url(#glowLight)"/>

  <!-- constellation mesh -->
  <g stroke="#5A5A5A" stroke-opacity="0.30" stroke-width="1">
    <line x1="70" y1="190" x2="170" y2="110"/>
    <line x1="170" y1="110" x2="250" y2="200"/>
    <line x1="250" y1="200" x2="335" y2="80"/>
    <line x1="335" y1="80" x2="415" y2="160"/>
    <line x1="415" y1="160" x2="495" y2="220"/>
    <line x1="495" y1="220" x2="575" y2="95"/>
    <line x1="575" y1="95" x2="655" y2="175"/>
    <line x1="655" y1="175" x2="735" y2="60"/>
    <line x1="735" y1="60" x2="815" y2="145"/>
    <line x1="815" y1="145" x2="895" y2="205"/>
    <line x1="895" y1="205" x2="975" y2="85"/>
    <line x1="975" y1="85" x2="1055" y2="165"/>
    <line x1="1055" y1="165" x2="1135" y2="110"/>
    <line x1="170" y1="110" x2="335" y2="80"/>
    <line x1="415" y1="160" x2="575" y2="95"/>
    <line x1="655" y1="175" x2="815" y2="145"/>
    <line x1="895" y1="205" x2="1055" y2="165"/>
  </g>

  <!-- nodes -->
  <g fill="#8A6D2F">
    <circle cx="70" cy="190" r="3.5"/>
    <circle cx="170" cy="110" r="5"/>
    <circle cx="250" cy="200" r="3.5"/>
    <circle cx="335" cy="80" r="6.5"/>
    <circle cx="415" cy="160" r="3.5"/>
    <circle cx="495" cy="220" r="4"/>
    <circle cx="575" cy="95" r="6"/>
    <circle cx="655" cy="175" r="4"/>
    <circle cx="735" cy="60" r="7"/>
    <circle cx="815" cy="145" r="4"/>
    <circle cx="895" cy="205" r="4"/>
    <circle cx="975" cy="85" r="6"/>
    <circle cx="1055" cy="165" r="4"/>
    <circle cx="1135" cy="110" r="5"/>
  </g>

  <g fill="#1A1A1A" fill-opacity="0.85">
    <circle cx="70" cy="190" r="1.4"/>
    <circle cx="250" cy="200" r="1.4"/>
    <circle cx="415" cy="160" r="1.4"/>
    <circle cx="655" cy="175" r="1.4"/>
    <circle cx="815" cy="145" r="1.4"/>
    <circle cx="1055" cy="165" r="1.4"/>
  </g>
</svg>
